<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>minimal site</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    #memeBanner {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 15px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    #memeText {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>my minimal site</h1>

    <div id="memeBanner">loading vibe...</div>

    <button onclick="generateMeme()">drop a Mellstroy moment 💀</button>

    <p id="memeText"></p>

  </div>

  <script>
    const bannerMemes = [
      "bro thinks he’s streaming in 2019 💀",
      "this site hits different",
      "no cap, you found this",
      "main character energy loading...",
      "chat is watching..."
    ];

    const memes = [
      "Mellstroy would break this UI in 2 seconds 💀",
      "chat is cooked",
      "average stream chaos moment",
      "admin left the server 💀",
      "skill issue detected",
      "POV: you joined mid-drama"
    ];

    document.getElementById("memeBanner").innerText =
      bannerMemes[Math.floor(Math.random() * bannerMemes.length)];

    function generateMeme() {
      const text =
        memes[Math.floor(Math.random() * memes.length)];

      document.getElementById("memeText").innerText = text;
    }
  </script>

</body>
</html>
